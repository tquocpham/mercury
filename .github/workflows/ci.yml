name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/wallet/go.mod

      - name: Run tests (pkg)
        working-directory: pkg
        run: GOWORK=off go test ./...

      - name: Run tests (wallet)
        working-directory: cmd/wallet
        run: GOWORK=off go test ./...

      - name: Run tests (auth)
        working-directory: cmd/auth
        run: GOWORK=off go test ./...

      - name: Run tests (trade)
        working-directory: cmd/trade
        run: GOWORK=off go test ./...


