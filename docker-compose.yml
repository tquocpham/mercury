version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (http://localhost:15672)
    environment:
      - RABBITMQ_DEFAULT_USER=$RABBITMQ_USER
      - RABBITMQ_DEFAULT_PASS=$RABBITMQ_PASSWORD

  influxdb:
    image: influxdb:3-core
    restart: always
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
    volumes:
      - "./docker/data/influxdb3:/var/lib/influxdb3/data"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  telegraf:
    image: telegraf:latest
    restart: always
    user: "root:root"
    entrypoint: ["/usr/bin/telegraf"]
    depends_on:
      - influxdb
    ports:
      - "8125:8125/udp"
    volumes:
      - "./docker/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: $GRAFANA_USER
      GF_SECURITY_ADMIN_PASSWORD: $GRAFANA_PASSWORD
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    volumes:
      - "./docker/data/grafana:/var/lib/grafana"
      - "./docker/grafana/provisioning:/etc/grafana/provisioning"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # host access
      - "29092:29092" # internal docker access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners:
      # - 9092 for host machine
      # - 29092 for docker services
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongo:
    image: mongo
    restart: always
    entrypoint:
      - bash
      - -c
      - |
        openssl rand -base64 756 > /tmp/mongo-keyfile
        chown 999:999 /tmp/mongo-keyfile
        chmod 400 /tmp/mongo-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo-keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - "./docker/data/mongodb:/data/db"
    ports:
      - "27017:27017"

  mongo-setup:
    image: mongo
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command: >
      mongosh --host mongo:27017 -u root -p root --authenticationDatabase admin
      --eval "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }"

  cassandra:
    image: cassandra:4.1
    restart: always
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "texting-cluster"
    volumes:
      - "./docker/data/cassandra:/var/lib/cassandra"

  redis:
    image: redis:7.4-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --requirepass $REDIS_PASSWORD
    volumes:
      - "./docker/data/redis:/data"

  auth:
    build:
      context: .
      dockerfile: cmd/auth/Dockerfile
    restart: always
    environment:
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      MONGO_ADDR: mongodb://root:root@mongo:27017
      REDIS_ADDR: redis:6379
      REDIS_PW: $REDIS_PASSWORD
      AWS_ACCESS_KEY: $AWS_ACCESS_KEY
      AWS_SECRET_KEY: $AWS_SECRET_KEY
      AWS_REGION: $AWS_REGION
      AWS_ENDPOINT: $AWS_ENDPOINT
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - mongo
      - redis
      - rabbitmq

  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    restart: always
    ports:
      - "9001:9001"
    environment:
      WEB_PORT: "9001"
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      AWS_ACCESS_KEY: $AWS_ACCESS_KEY
      AWS_SECRET_KEY: $AWS_SECRET_KEY
      AWS_REGION: $AWS_REGION
      AWS_ENDPOINT: $AWS_ENDPOINT
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - rabbitmq

  messages:
    build:
      context: .
      dockerfile: cmd/messages/Dockerfile
    restart: always
    environment:
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      CASSANDRA_HOST: cassandra
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: messages
      REDIS_ADDR: redis:6379
      REDIS_PW: $REDIS_PASSWORD
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - cassandra
      - kafka
      - rabbitmq
      - redis

  msgworker:
    build:
      context: .
      dockerfile: cmd/msgworker/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: info
      ENVIRONMENT: docker
      STATSD_ADDR: telegraf:8125
      CASSANDRA_HOST: cassandra
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: messages
      KAFKA_GROUP_ID: messages-consumer-group
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - kafka
      - cassandra
      - rabbitmq

  subscriber:
    build:
      context: .
      dockerfile: cmd/subscriber/Dockerfile
    restart: always
    ports:
      - "9004:9004"
    environment:
      WEB_PORT: "9004"
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      REDIS_ADDR: redis:6379
      REDIS_PW: $REDIS_PASSWORD
      AWS_ACCESS_KEY: $AWS_ACCESS_KEY
      AWS_SECRET_KEY: $AWS_SECRET_KEY
      AWS_REGION: $AWS_REGION
      AWS_ENDPOINT: $AWS_ENDPOINT
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - redis
      - rabbitmq

  publisher:
    build:
      context: .
      dockerfile: cmd/publisher/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      REDIS_ADDR: redis:6379
      REDIS_PW: $REDIS_PASSWORD
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - redis
      - rabbitmq

  mmservice:
    build:
      context: .
      dockerfile: cmd/mmservice/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      MONGO_ADDR: mongodb://root:root@mongo:27017
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - mongo
      - rabbitmq

  mmsolver:
    build:
      context: .
      dockerfile: cmd/mmsolver/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      MONGO_ADDR: mongodb://root:root@mongo:27017
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - mongo
      - rabbitmq

  gatewaypriv:
    build:
      context: .
      dockerfile: cmd/gatewaypriv/Dockerfile
    restart: always
    ports:
      - "9002:9002"
    environment:
      WEB_PORT: "9002"
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      AWS_ACCESS_KEY: $AWS_ACCESS_KEY
      AWS_SECRET_KEY: $AWS_SECRET_KEY
      AWS_REGION: $AWS_REGION
      AWS_ENDPOINT: $AWS_ENDPOINT
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - rabbitmq

  trade:
    build:
      context: .
      dockerfile: cmd/trade/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      MONGO_ADDR: mongodb://root:root@mongo:27017
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - mongo
      - rabbitmq

  wallet:
    build:
      context: .
      dockerfile: cmd/wallet/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      MONGO_ADDR: mongodb://root:root@mongo:27017
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - mongo
      - rabbitmq

  courier:
    build:
      context: .
      dockerfile: cmd/courier/Dockerfile
    restart: always
    environment:
      LOG_LEVEL: debug
      STATSD_ADDR: telegraf:8125
      ENVIRONMENT: docker
      MONGO_ADDR: mongodb://root:root@mongo:27017
      AMQP_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672/
    depends_on:
      - mongo
      - rabbitmq
