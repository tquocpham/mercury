syntax = "proto3";

// This path should match your module name + a folder for the pb
// command: protoc --go_out=pb/ --go_opt=paths=source_relative portal.proto
option go_package = "github.com/mercury/cmd/portal/pb";

package portal;

enum GameMsg {
  UNKNOWN = 0;
  TRADE_REQUEST = 12;
  // Inventory Messages
  INVENTORY_GET_REQUEST = 21;
  INVENTORY_ADD_ITEM = 23;
  INVENTORY_ADD_ITEM_TO_SLOT = 24;
}

message TradeRequest {
  int32 item_id = 1;
}

message TradeResponse {
  bool success = 1;
  string message = 2;
}

message InventoryGetRequest {
  string player_id = 1;
}

message Item {
	string item_id = 1;
	int32 amount = 2;
}

message InventoryGetResponse {
  string player_id = 1;
  repeated Item inventory = 2;
}

message InventoryAddItemRequest {
  string player_id = 1;
  string item_id   = 2;
  int32  amount    = 3;
  int32  max_stack = 4;
  string order_id  = 5;
}

message InventoryAddItemToSlotRequest {
  string player_id = 1;
  string item_id   = 2;
  int32  slot_id   = 3;
  int32  amount    = 4;
  int32  max_stack = 5;
  string order_id  = 6;
}
